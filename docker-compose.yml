services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: luna
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  app:
    image: ghcr.io/tarminik/luna_test:latest
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/luna"
    depends_on:
      - postgres

volumes:
  pgdata:
